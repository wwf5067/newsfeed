# Nginx 主配置:暴露 80 端口,反代 /api 到 api 容器,其余请求 serve 前端静态文件。
# 后续上 HTTPS 时新增一个 server { listen 443 ssl; ... } 段并加 certbot。

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 后端 api 服务通过 docker 内部网络访问,主机名是 compose 服务名 `api`。
    #
    # 关键:不能用 `upstream { server api:8080; }` 这种写法。
    # 原因:nginx 只在 worker 启动时解析一次 upstream 里的主机名,把 IP 缓存住。
    # 但 compose `up -d api` 重建 api 容器时,新容器拿到的是新 IP,
    # 旧 IP 立刻失效 → nginx 持续连旧 IP → 502 直到 nginx 自己被重启。
    #
    # 现方案:用 Docker 内置 DNS(127.0.0.11)+ proxy_pass 写变量。
    # 当 proxy_pass 的目标包含变量时,nginx 会按 resolver 的 valid TTL 重新解析,
    # 这样 api 容器换 IP 后,最长 valid 秒后就能自动跟上,无需重启 nginx。
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # 安全头(够个人项目用)
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # API 反代。$api_upstream 必须用 set 声明成变量(而不是直接写 api:8080),
        # 否则 nginx 会退化回启动时一次性解析的老行为。
        location /api/ {
            set $api_upstream "api:8080";
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # 微信/社交分享专用页:由 api 服务渲染纯静态 HTML(带 OG meta),
        # 真实用户会被 meta refresh 跳到前端 /article/{id}。
        location /share/ {
            set $api_upstream "api:8080";
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # 前端静态文件
        root /usr/share/nginx/html;
        index index.html;

        # Next.js export 模式下 _next/static 资源带 hash,可长缓存
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA 兜底:任何未匹配的路径回到 index.html(预留给将来的客户端路由)
        location / {
            try_files $uri $uri.html $uri/index.html /index.html;
        }
    }
}
