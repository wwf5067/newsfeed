# Nginx 主配置:暴露 80 端口,反代 /api 到 api 容器,其余请求 serve 前端静态文件。
# 后续上 HTTPS 时新增一个 server { listen 443 ssl; ... } 段并加 certbot。

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 后端 api 服务通过 docker 内部网络访问。注意:这里写的是 compose 服务名。
    upstream api_upstream {
        server api:8080;
    }

    server {
        listen 80;
        server_name _;

        # 安全头(够个人项目用)
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # API 反代
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # 前端静态文件
        root /usr/share/nginx/html;
        index index.html;

        # Next.js export 模式下 _next/static 资源带 hash,可长缓存
        location /_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA 兜底:任何未匹配的路径回到 index.html(预留给将来的客户端路由)
        location / {
            try_files $uri $uri.html $uri/index.html /index.html;
        }
    }
}
