# 推 main 时:
#   1) 跑 Go 测试
#   2) 构建 api / crawler 镜像并推到 GHCR
#   3) 构建前端静态产物
#   4) SSH 到 Lighthouse:同步 deploy/ 配置和前端产物 -> docker compose pull && up
#
# 必需的 GitHub Secrets(在仓库 Settings -> Secrets and variables -> Actions 配置):
#   SSH_HOST       Lighthouse 公网 IP
#   SSH_USER       SSH 用户名(通常 ubuntu / lighthouse)
#   SSH_PORT       SSH 端口(默认 22 也可以填)
#   SSH_KEY        私钥内容(完整 PEM,含 BEGIN/END 行)
#
# GHCR 推送用 GITHUB_TOKEN,无需额外配置。

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # owner 小写,用于镜像 path
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build-images:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.app
          build-args: SERVICE=api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/newsfeed-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/newsfeed-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push crawler
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.app
          build-args: SERVICE=crawler
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/newsfeed-crawler:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/newsfeed-crawler:latest
          cache-from: type=gha,scope=crawler
          cache-to: type=gha,scope=crawler,mode=max

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Pack static dist
        run: tar -czf web-dist.tar.gz -C web/out .
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz
          retention-days: 7

  deploy:
    needs: [build-images, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Set lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -r deploy/docker-compose.prod.yml deploy/nginx.conf migrations bundle/
          cp web-dist.tar.gz bundle/
          tar -czf bundle.tar.gz -C bundle .
          ls -la bundle/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload bundle
        run: |
          scp -P ${{ secrets.SSH_PORT || 22 }} bundle.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/newsfeed-bundle.tar.gz

      - name: Render remote deploy script
        env:
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
          OWNER: ${{ steps.owner.outputs.lc }}
        run: |
          # 把 deploy 脚本写成本地文件,然后 scp 上去执行。
          # 之前用 `ssh <<'REMOTE'` heredoc 通过 stdin 传脚本,Actions runner
          # 在 stdin EOF 后偶尔会过早 disconnect(实际事故:5/18 那次 migrate
          # 跑完瞬间 runner 主动断开,up -d 还没机会执行,但 step 报 success)。
          cat > deploy-remote.sh <<'EOS'
          #!/usr/bin/env bash
          set -euo pipefail

          : "${IMAGE_TAG:?IMAGE_TAG required}"
          : "${OWNER:?OWNER required}"

          APP_DIR=/opt/newsfeed
          sudo mkdir -p "$APP_DIR"
          sudo chown "$USER":"$USER" "$APP_DIR"

          # 解包配置
          tar -xzf /tmp/newsfeed-bundle.tar.gz -C "$APP_DIR"
          rm -f /tmp/newsfeed-bundle.tar.gz

          # 解包前端
          rm -rf "$APP_DIR/web-dist"
          mkdir -p "$APP_DIR/web-dist"
          tar -xzf "$APP_DIR/web-dist.tar.gz" -C "$APP_DIR/web-dist"
          rm -f "$APP_DIR/web-dist.tar.gz"

          cd "$APP_DIR"

          # 首次部署需要手动准备 .env;之后 CI 只覆盖配置和镜像 tag
          if [ ! -f .env ]; then
            echo "ERROR: $APP_DIR/.env missing. 首次部署请先 SSH 上来手动创建 .env(参考 .env.prod.example)" >&2
            exit 1
          fi

          # 用 CI 推过来的最新 tag 覆盖镜像引用
          sed -i "s|^API_IMAGE=.*|API_IMAGE=ghcr.io/${OWNER}/newsfeed-api:${IMAGE_TAG}|" .env
          sed -i "s|^CRAWLER_IMAGE=.*|CRAWLER_IMAGE=ghcr.io/${OWNER}/newsfeed-crawler:${IMAGE_TAG}|" .env

          # plain 进度避免 ANSI 控制字符把 Actions runner 的输出 buffer 搞崩
          docker compose -f docker-compose.prod.yml --progress plain pull
          # 迁移(失败则整体退出,避免 "表不存在" 这种隐性问题)
          docker compose -f docker-compose.prod.yml --progress plain --profile migrate run --rm migrate
          docker compose -f docker-compose.prod.yml --progress plain up -d
          # web-dist 目录被上面 rm -rf 重建过,inode 变了。镜像没变时 `up -d`
          # 不会重启 nginx,旧容器仍持有失效挂载(幽灵挂载),需手动 restart。
          docker compose -f docker-compose.prod.yml --progress plain restart nginx
          docker compose -f docker-compose.prod.yml ps

          # ---- 远端自检:确认容器真的换上了新镜像 + 服务能响应 ----
          echo "==> Verifying deployment on host..."

          EXPECTED_API="ghcr.io/${OWNER}/newsfeed-api:${IMAGE_TAG}"
          EXPECTED_CRAWLER="ghcr.io/${OWNER}/newsfeed-crawler:${IMAGE_TAG}"

          ACTUAL_API=$(docker inspect --format '{{.Config.Image}}' newsfeed-api-1)
          ACTUAL_CRAWLER=$(docker inspect --format '{{.Config.Image}}' newsfeed-crawler-1)

          if [ "$ACTUAL_API" != "$EXPECTED_API" ]; then
            echo "ERROR: api container image mismatch: expected=$EXPECTED_API actual=$ACTUAL_API" >&2
            exit 1
          fi
          if [ "$ACTUAL_CRAWLER" != "$EXPECTED_CRAWLER" ]; then
            echo "ERROR: crawler container image mismatch: expected=$EXPECTED_CRAWLER actual=$ACTUAL_CRAWLER" >&2
            exit 1
          fi

          # 等服务起来,最多 30 秒
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1/ || echo "000")
            if [ "$code" = "200" ]; then
              echo "==> Healthcheck passed on attempt $i (HTTP $code)"
              break
            fi
            if [ "$i" = "15" ]; then
              echo "ERROR: healthcheck failed after 15 attempts (last code: $code)" >&2
              docker compose -f docker-compose.prod.yml logs --tail 30 nginx api >&2 || true
              exit 1
            fi
            sleep 2
          done

          api_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 "http://127.0.0.1/api/v1/articles?limit=1" || echo "000")
          if [ "$api_code" != "200" ]; then
            echo "ERROR: /api/v1/articles returned HTTP $api_code" >&2
            exit 1
          fi
          echo "==> Deployment verified: images=${IMAGE_TAG}, http=200, api=200"
          EOS
          chmod +x deploy-remote.sh

      - name: Upload deploy script
        run: |
          scp -P ${{ secrets.SSH_PORT || 22 }} deploy-remote.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/newsfeed-deploy.sh

      - name: Run deploy script on host
        env:
          IMAGE_TAG: ${{ needs.build-images.outputs.image_tag }}
          OWNER: ${{ steps.owner.outputs.lc }}
        # -tt 强制分配 pty,防止远端命令在 stdin 关闭后被提前结束。
        # ServerAliveInterval 让客户端定期发心跳,长 pull 不会被认为 idle 断连。
        run: |
          ssh -tt \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "IMAGE_TAG='${IMAGE_TAG}' OWNER='${OWNER}' bash /tmp/newsfeed-deploy.sh && rm -f /tmp/newsfeed-deploy.sh"
