# 推 main 时:
#   1) 跑 Go 测试
#   2) 本地编译 api / crawler binary → 用轻量 runtime 镜像打包推到 GHCR
#   3) 构建前端静态产物
#   4) SSH 到 Lighthouse:同步 deploy/ 配置和前端产物 -> docker compose pull && up
#
# 优化点(对比旧版):
#   - Go 编译在 runner 上直接跑,两个 binary 共享 Go build cache(gse 只编译一次)
#   - Docker build 只做 COPY binary → alpine(秒级,无 go mod download)
#   - api 和 crawler 镜像并行构建(matrix)
#   - .dockerignore 排除 web/node_modules 等大目录
#
# 必需的 GitHub Secrets:
#   SSH_HOST / SSH_USER / SSH_PORT / SSH_KEY

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go test ./...

  build-images:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api, crawler, extractor]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Go binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o dist/app ./cmd/${{ matrix.service }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./dist
          file: deploy/Dockerfile.runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/newsfeed-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/newsfeed-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Pack static dist
        run: tar -czf web-dist.tar.gz -C web/out .
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz
          retention-days: 7

  deploy:
    needs: [build-images, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Set lowercase image owner
        id: owner
        run: echo "lc=${IMAGE_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -r deploy/docker-compose.prod.yml deploy/nginx.conf migrations bundle/
          cp web-dist.tar.gz bundle/
          tar -czf bundle.tar.gz -C bundle .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload bundle
        run: |
          scp -P ${{ secrets.SSH_PORT || 22 }} bundle.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/newsfeed-bundle.tar.gz

      - name: Render remote deploy script
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          OWNER: ${{ steps.owner.outputs.lc }}
        run: |
          cat > deploy-remote.sh <<'EOS'
          #!/usr/bin/env bash
          set -euo pipefail

          : "${IMAGE_TAG:?IMAGE_TAG required}"
          : "${OWNER:?OWNER required}"

          APP_DIR=/opt/newsfeed
          sudo mkdir -p "$APP_DIR"
          sudo chown "$USER":"$USER" "$APP_DIR"

          OLD_NGINX_HASH=$(sha256sum "$APP_DIR/nginx.conf" 2>/dev/null | cut -d' ' -f1 || echo "")

          tar -xzf /tmp/newsfeed-bundle.tar.gz -C "$APP_DIR"
          rm -f /tmp/newsfeed-bundle.tar.gz

          NEW_NGINX_HASH=$(sha256sum "$APP_DIR/nginx.conf" 2>/dev/null | cut -d' ' -f1 || echo "")

          mkdir -p "$APP_DIR/web-dist" "$APP_DIR/web-dist-staging"
          rm -rf "$APP_DIR/web-dist-staging"/*
          tar -xzf "$APP_DIR/web-dist.tar.gz" -C "$APP_DIR/web-dist-staging"
          rm -f "$APP_DIR/web-dist.tar.gz"
          rsync -a --delete "$APP_DIR/web-dist-staging/" "$APP_DIR/web-dist/"
          rm -rf "$APP_DIR/web-dist-staging"

          cd "$APP_DIR"

          if [ ! -f .env ]; then
            echo "ERROR: $APP_DIR/.env missing." >&2
            exit 1
          fi

          sed -i "s|^API_IMAGE=.*|API_IMAGE=ghcr.io/${OWNER}/newsfeed-api:${IMAGE_TAG}|" .env
          sed -i "s|^CRAWLER_IMAGE=.*|CRAWLER_IMAGE=ghcr.io/${OWNER}/newsfeed-crawler:${IMAGE_TAG}|" .env
          sed -i "s|^EXTRACTOR_IMAGE=.*|EXTRACTOR_IMAGE=ghcr.io/${OWNER}/newsfeed-extractor:${IMAGE_TAG}|" .env

          docker compose -f docker-compose.prod.yml --progress plain pull
          docker compose -f docker-compose.prod.yml --progress plain --profile migrate run --rm migrate
          docker compose -f docker-compose.prod.yml --progress plain up -d
          docker compose -f docker-compose.prod.yml --progress plain up -d --force-recreate --no-deps api crawler

          if [ "$OLD_NGINX_HASH" != "$NEW_NGINX_HASH" ]; then
            echo "==> nginx.conf changed, restarting nginx"
            docker compose -f docker-compose.prod.yml restart nginx
          fi
          docker compose -f docker-compose.prod.yml ps

          # ---- 自检 ----
          echo "==> Verifying deployment..."

          EXPECTED_API="ghcr.io/${OWNER}/newsfeed-api:${IMAGE_TAG}"
          EXPECTED_CRAWLER="ghcr.io/${OWNER}/newsfeed-crawler:${IMAGE_TAG}"
          EXPECTED_EXTRACTOR="ghcr.io/${OWNER}/newsfeed-extractor:${IMAGE_TAG}"

          ACTUAL_API=$(docker inspect --format '{{.Config.Image}}' newsfeed-api-1)
          ACTUAL_CRAWLER=$(docker inspect --format '{{.Config.Image}}' newsfeed-crawler-1)
          ACTUAL_EXTRACTOR=$(docker inspect --format '{{.Config.Image}}' newsfeed-extractor-1)

          if [ "$ACTUAL_API" != "$EXPECTED_API" ]; then
            echo "ERROR: api image mismatch: expected=$EXPECTED_API actual=$ACTUAL_API" >&2
            exit 1
          fi
          if [ "$ACTUAL_CRAWLER" != "$EXPECTED_CRAWLER" ]; then
            echo "ERROR: crawler image mismatch: expected=$EXPECTED_CRAWLER actual=$ACTUAL_CRAWLER" >&2
            exit 1
          fi
          if [ "$ACTUAL_EXTRACTOR" != "$EXPECTED_EXTRACTOR" ]; then
            echo "ERROR: extractor image mismatch: expected=$EXPECTED_EXTRACTOR actual=$ACTUAL_EXTRACTOR" >&2
            exit 1
          fi

          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1/ || echo "000")
            if [ "$code" = "200" ]; then
              echo "==> Healthcheck passed on attempt $i (HTTP $code)"
              break
            fi
            if [ "$i" = "15" ]; then
              echo "ERROR: healthcheck failed after 15 attempts (last code: $code)" >&2
              docker compose -f docker-compose.prod.yml logs --tail 30 nginx api >&2 || true
              exit 1
            fi
            sleep 2
          done

          api_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 "http://127.0.0.1/api/v1/articles?limit=1" || echo "000")
          if [ "$api_code" != "200" ]; then
            echo "ERROR: /api/v1/articles returned HTTP $api_code" >&2
            exit 1
          fi
          echo "==> Deployment verified: images=${IMAGE_TAG}, http=200, api=200"
          EOS
          chmod +x deploy-remote.sh

      - name: Upload deploy script
        run: |
          scp -P ${{ secrets.SSH_PORT || 22 }} deploy-remote.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/newsfeed-deploy.sh

      - name: Run deploy script on host
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          OWNER: ${{ steps.owner.outputs.lc }}
        run: |
          ssh -tt \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "IMAGE_TAG='${IMAGE_TAG}' OWNER='${OWNER}' bash /tmp/newsfeed-deploy.sh && rm -f /tmp/newsfeed-deploy.sh"
